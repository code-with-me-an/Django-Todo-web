{% load static %}

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="{% static 'css/home.css' %}" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
  </head>
  <body>
    <h2 class="d-flex justify-content-center mt-5 fw-bold">ToDo app</h2>
    <div class="container mt-5">
      <div class="row">
        <div class="col">
          <h3 class="mb-1">ToDay Task</h3>
          <p class="mb-1">30 march 26</p>
        </div>
        <div class="col d-flex align-items-end">
          <p class="fs-5 mb-1">Completed Task</p>
        </div>
      </div>
      <div class="row">
        <div class="Column1 col fs-4">
          <div class="task p-2 d-flex align-items-center">
            <p class="p-1 me-auto mb-0 text-wrap">study physics morning</p>
            <button
              type="button"
              class="btn btn-outline-dark fs-6 d-flex align-items-center"
              id="complete"
            >
              <i class="fa-solid fa-check fa-lg fs-6"></i> Mark as Done
            </button>
            <i class="delete bi bi-trash3-fill btn btn-outline-dark"></i>
            <i class="edit bi bi-pen btn btn-outline-dark "></i>
          </div>
        </div>
        <div class="Column2 col fs-4">
          <div class="complete p-2 d-flex align-items-center">
            <p class="p-1 me-auto mb-0 text-wrap">study physics morning</p>
            <button
              type="button"
              class="btn btn-outline-dark fs-6"
              id="complete"
            >
              <i class="fa-solid fa-x fa-lg fs-6"></i> Mark as Undone
            </button>
          </div>
        </div>
        <div class="maker container mt-4 ms-5 d-flex">
          <form action="" class="d-flex">
            <input type="text" placeholder="Add a Task">
            <button type="submit"><i class="fa-solid fa-arrow-up fa-xl"></i></button>
          </form>
        </div>
      </div>
    </div>
  </body>
</html>
